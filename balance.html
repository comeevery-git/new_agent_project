<body class="balance-theme">

  <nav class="page-nav">
    <a href="index.html" class="back-btn">← 홈</a>
    <span class="page-nav-title">⚖️ 밸런스 게임</span>
    <div class="nav-spacer"></div>
  </nav>

  <main class="game-page">
    <div class="container">
      <div class="balance-progress" id="balance-progress">1 / 25</div>
      <div class="balance-cards">
        <div class="balance-card" id="balance-a">A</div>
        <div class="balance-vs">VS</div>
        <div class="balance-card" id="balance-b">B</div>
      </div>
      <button class="generate-btn" id="balance-next">다음 질문 →</button>
    </div>
  </main>

  <section class="other-games">
    <h2>다른 게임도 해보세요</h2>

  </footer>

  <script>
    let questions = [];
    let queue = [];
    let current = 0;

    async function load() {
      try {
        const res = await fetch('content/balance.json');
        questions = await res.json();
        queue = [...questions].sort(() => Math.random() - 0.5);
        show();
      } catch (e) { console.error('balance.json 로딩 실패', e); }
    }

    function show() {
      if (current >= queue.length) {
        current = 0;
        queue = [...queue].sort(() => Math.random() - 0.5);
      }
      const q = queue[current];
      document.getElementById('balance-a').textContent = q.a;
      document.getElementById('balance-b').textContent = q.b;
      document.getElementById('balance-a').classList.remove('selected');
      document.getElementById('balance-b').classList.remove('selected');
      document.getElementById('balance-progress').textContent = `${current + 1} / ${queue.length}`;
    }

    document.getElementById('balance-a').addEventListener('click', function () {
      document.getElementById('balance-b').classList.remove('selected');
      this.classList.toggle('selected');
    });
    document.getElementById('balance-b').addEventListener('click', function () {
      document.getElementById('balance-a').classList.remove('selected');
      this.classList.toggle('selected');
    });
    document.getElementById('balance-next').addEventListener('click', () => { current++; show(); });

    load();
  </script>
</body>
