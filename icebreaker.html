<body class="meeting-theme">

  <nav class="page-nav">
    <a href="index.html" class="back-btn">← 홈</a>
    <span class="page-nav-title">💬 아이스브레이킹</span>
    <button class="share-btn" id="share-btn">🔗 공유</button>
  </nav>

  <main class="game-page">
    <div class="container">
      <div class="category-tabs" id="tabs">
        <button data-cat="meeting" class="active">첫 만남</button>
        <button data-cat="office">오피스</button>
        <button data-cat="casual">캐주얼</button>
      </div>
      <div class="card" id="question-card">
        <p class="question-text fade-in" id="question">질문을 뽑아보세요!</p>
      </div>
      <button class="generate-btn" id="generate-btn">✨ 랜덤 질문 뽑기</button>
    </div>
  </main>

  <section class="situations-section" data-aos="fade-up">
    <h2>이런 상황에서 활용해보세요</h2>
    <div class="situations-grid">
      <div class="situation-card"><span class="sit-icon">🆕</span><span class="sit-text">처음 만나는 자리</span></div>
      <div class="situation-card"><span class="sit-icon">🍻</span><span class="sit-text">회식 &amp; 모임</span></div>
      <div class="situation-card"><span class="sit-icon">💕</span><span class="sit-text">소개팅</span></div>
      <div class="situation-card"><span class="sit-icon">🏢</span><span class="sit-text">팀 빌딩</span></div>
    </div>
  </section>

  <section class="other-games" data-aos="fade-up">
    <h2>다른 게임도 해보세요</h2>
    <div class="other-games-list">
      <a href="balance.html"  class="other-game-link"><span>⚖️</span><span>밸런스 게임</span></a>
      <a href="quiz.html"     class="other-game-link"><span>🔤</span><span>초성 퀴즈</span></a>
      <a href="capital.html"  class="other-game-link"><span>🌍</span><span>수도 맞추기</span></a>
      <a href="nunchi.html"   class="other-game-link"><span>🤫</span><span>눈치게임</span></a>
    </div>
  </section>
  <footer class="home-footer">
    <p>© 2025 미니게임 허브 · <a href="privacy.html">개인정보처리방침</a></p>
  </footer>

  <div class="toast" id="toast">🔗 링크가 복사되었어요!</div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    let allQuestions = [];
    let currentCategory = 'meeting';
    const questionEl = document.getElementById('question');

    async function loadQuestions() {
      try {
        const res = await fetch('content/questions.json');
        allQuestions = await res.json();
      } catch (e) {
        questionEl.innerText = '데이터 로딩 실패 😢';
      }
    }

    document.querySelectorAll('#tabs button').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('#tabs button').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.cat;
        const map = { meeting: 'meeting-theme', office: 'office-theme', casual: 'casual-theme' };
        document.body.className = map[currentCategory];
      });
    });

    document.getElementById('generate-btn').addEventListener('click', () => {
      const pool = allQuestions.filter(q => q.category === currentCategory);
      if (!pool.length) return;
      const q = pool[Math.floor(Math.random() * pool.length)];
      questionEl.classList.remove('fade-in');
      void questionEl.offsetWidth;
      questionEl.classList.add('fade-in');
      questionEl.innerText = q.question;
    });

    loadQuestions();

    AOS.init({ once: true, duration: 500, offset: 40 });

    document.getElementById('share-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      });
    });
  </script>
</body>
</html>
