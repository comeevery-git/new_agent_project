<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미니게임 허브</title>
  <link rel="stylesheet" href="../designer/style.css">
</head>
<body class="meeting-theme">

  <!-- 상단 네비게이션 -->
  <nav class="app-nav">
    <span class="nav-game-title" id="nav-title">💬 아이스브레이킹</span>
    <button class="menu-btn" id="menu-btn" title="게임 선택">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- 게임 선택 바텀 시트 -->
  <div class="game-menu-overlay" id="game-menu-overlay">
    <div class="game-menu">
      <div class="game-menu-handle"></div>
      <div class="game-menu-header">
        <span>🎮 게임 선택</span>
        <button class="close-menu-btn" id="close-menu-btn">✕</button>
      </div>
      <div class="game-list" id="game-list">
        <div class="game-card active" data-game="icebreaker">
          <div class="game-card-icon">💬</div>
          <div class="game-card-info">
            <div class="game-card-name">아이스브레이킹</div>
            <div class="game-card-desc">랜덤 질문으로 어색함 깨기</div>
          </div>
        </div>
        <div class="game-card" data-game="ladder">
          <div class="game-card-icon">🪜</div>
          <div class="game-card-info">
            <div class="game-card-name">사다리타기</div>
            <div class="game-card-desc">공평한 사다리 게임</div>
          </div>
        </div>
        <div class="game-card" data-game="balance">
          <div class="game-card-icon">⚖️</div>
          <div class="game-card-info">
            <div class="game-card-name">밸런스 게임</div>
            <div class="game-card-desc">둘 중 하나만 골라야 한다면?</div>
          </div>
        </div>
        <div class="game-card" data-game="quiz">
          <div class="game-card-icon">🔤</div>
          <div class="game-card-info">
            <div class="game-card-name">초성 퀴즈</div>
            <div class="game-card-desc">초성만 보고 단어 맞추기</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 아이스브레이킹 뷰 ===== -->
  <div class="game-view" id="view-icebreaker">
    <div class="container">
      <div class="category-tabs" id="tabs">
        <button data-cat="meeting" class="active">첫 만남</button>
        <button data-cat="office">오피스</button>
        <button data-cat="casual">캐주얼</button>
      </div>
      <div class="card" id="question-card">
        <p class="question-text fade-in" id="question">질문을 뽑아보세요!</p>
      </div>
      <button class="generate-btn" id="generate-btn">✨ 랜덤 질문 뽑기</button>
    </div>
  </div>

  <!-- ===== 밸런스 게임 뷰 ===== -->
  <div class="game-view hidden" id="view-balance">
    <div class="container">
      <div class="balance-progress" id="balance-progress">1 / 25</div>
      <div class="balance-cards">
        <div class="balance-card" id="balance-a" data-side="a">A</div>
        <div class="balance-vs">VS</div>
        <div class="balance-card" id="balance-b" data-side="b">B</div>
      </div>
      <button class="generate-btn" id="balance-next">다음 질문 →</button>
    </div>
  </div>

  <!-- ===== 초성 퀴즈 뷰 ===== -->
  <div class="game-view hidden" id="view-quiz">
    <div class="container">
      <div class="quiz-progress" id="quiz-progress">1 / 25</div>
      <div class="quiz-card">
        <div class="quiz-consonants" id="quiz-consonants">ㅊㅋ</div>
        <div class="quiz-timer-bar"><div class="quiz-timer-fill" id="quiz-timer-fill"></div></div>
        <div class="quiz-hint hidden" id="quiz-hint"></div>
        <div class="quiz-answer hidden" id="quiz-answer"></div>
      </div>
      <div class="quiz-actions" id="quiz-actions">
        <button class="secondary-btn" id="quiz-hint-btn">💡 힌트</button>
        <button class="generate-btn" id="quiz-reveal-btn">정답 보기</button>
      </div>
      <button class="generate-btn hidden" id="quiz-next-btn">다음 문제 →</button>
    </div>
  </div>

  <!-- ===== 사다리타기 뷰 ===== -->
  <div class="game-view hidden" id="view-ladder">
    <div class="ladder-container">

      <!-- 설정 단계 -->
      <div id="ladder-setup">
        <h2 class="ladder-title">🪜 사다리타기</h2>
        <p class="ladder-subtitle">참여자 이름과 결과를 입력하세요</p>
        <div class="ladder-inputs">
          <div class="ladder-col-header">
            <span>👤 참여자</span>
            <span>🎁 결과</span>
          </div>
          <div id="player-rows">
            <div class="player-row">
              <input type="text" class="player-input" placeholder="이름 1">
              <input type="text" class="result-input" placeholder="결과 1">
            </div>
            <div class="player-row">
              <input type="text" class="player-input" placeholder="이름 2">
              <input type="text" class="result-input" placeholder="결과 2">
            </div>
          </div>
          <button class="add-player-btn" id="add-player-btn">+ 참여자 추가</button>
        </div>
        <button class="generate-btn ladder-start-btn" id="ladder-start-btn">🪜 사다리 타기!</button>
      </div>

      <!-- 게임 단계 -->
      <div id="ladder-game" class="hidden">
        <canvas id="ladder-canvas"></canvas>
        <div class="ladder-actions">
          <button class="generate-btn" id="reveal-btn">🎉 결과 공개!</button>
          <button class="secondary-btn" id="ladder-reset-btn">↩ 다시 설정</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ==================== 게임 관리 ====================
    const GAMES = {
      icebreaker: { title: '💬 아이스브레이킹', theme: 'meeting-theme' },
      ladder:     { title: '🪜 사다리타기',     theme: 'ladder-theme'  },
      balance:    { title: '⚖️ 밸런스 게임',    theme: 'balance-theme' },
      quiz:       { title: '🔤 초성 퀴즈',      theme: 'quiz-theme'    }
    };
    let currentGame = 'icebreaker';

    function switchGame(name) {
      if (name === currentGame) { closeMenu(); return; }
      // 퀴즈 타이머 정지
      if (currentGame === 'quiz') clearInterval(quizTimer);
      document.querySelectorAll('.game-view').forEach(v => v.classList.add('hidden'));
      document.getElementById(`view-${name}`).classList.remove('hidden');
      document.getElementById('nav-title').textContent = GAMES[name].title;
      document.body.className = GAMES[name].theme;
      document.querySelectorAll('.game-card').forEach(c => c.classList.toggle('active', c.dataset.game === name));
      currentGame = name;
      closeMenu();
      // 게임별 초기화
      if (name === 'balance') startBalance();
      if (name === 'quiz') startQuiz();
    }

    // 메뉴 열기/닫기
    const overlay = document.getElementById('game-menu-overlay');
    document.getElementById('menu-btn').addEventListener('click', () => overlay.classList.add('open'));
    document.getElementById('close-menu-btn').addEventListener('click', closeMenu);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeMenu(); });
    function closeMenu() { overlay.classList.remove('open'); }

    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => switchGame(card.dataset.game));
    });

    // ==================== 아이스브레이킹 ====================
    let allQuestions = [];
    let currentCategory = 'meeting';
    const questionEl = document.getElementById('question');

    async function loadQuestions() {
      try {
        const res = await fetch('../content/questions.json');
        allQuestions = await res.json();
      } catch (e) {
        questionEl.innerText = '데이터 로딩 실패 😢';
      }
    }

    document.querySelectorAll('#tabs button').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('#tabs button').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentCategory = tab.dataset.cat;
        if (currentGame === 'icebreaker') {
          const map = { meeting: 'meeting-theme', office: 'office-theme', casual: 'casual-theme' };
          document.body.className = map[currentCategory];
        }
      });
    });

    document.getElementById('generate-btn').addEventListener('click', () => {
      const pool = allQuestions.filter(q => q.category === currentCategory);
      if (!pool.length) return;
      const q = pool[Math.floor(Math.random() * pool.length)];
      questionEl.classList.remove('fade-in');
      void questionEl.offsetWidth;
      questionEl.classList.add('fade-in');
      questionEl.innerText = q.question;
    });

    loadQuestions();

    // ==================== 사다리타기 ====================
    const playerRows = document.getElementById('player-rows');
    const addPlayerBtn = document.getElementById('add-player-btn');
    let ladderState = {};

    function renumberPlaceholders() {
      playerRows.querySelectorAll('.player-row').forEach((row, i) => {
        const pi = row.querySelector('.player-input');
        const ri = row.querySelector('.result-input');
        if (!pi.value) pi.placeholder = `이름 ${i + 1}`;
        if (!ri.value) ri.placeholder = `결과 ${i + 1}`;
      });
      addPlayerBtn.disabled = playerRows.children.length >= 6;
    }

    addPlayerBtn.addEventListener('click', () => {
      if (playerRows.children.length >= 6) return;
      const idx = playerRows.children.length + 1;
      const row = document.createElement('div');
      row.className = 'player-row';
      row.innerHTML = `
        <input type="text" class="player-input" placeholder="이름 ${idx}">
        <input type="text" class="result-input" placeholder="결과 ${idx}">
        <button class="remove-row-btn" onclick="this.closest('.player-row').remove(); renumberPlaceholders();">✕</button>
      `;
      playerRows.appendChild(row);
      renumberPlaceholders();
    });

    document.getElementById('ladder-start-btn').addEventListener('click', startLadder);
    document.getElementById('reveal-btn').addEventListener('click', revealResults);
    document.getElementById('ladder-reset-btn').addEventListener('click', resetLadder);

    function startLadder() {
      const rows = [...playerRows.querySelectorAll('.player-row')];
      if (rows.length < 2) { alert('최소 2명 이상 입력해주세요!'); return; }

      const players = rows.map((r, i) => r.querySelector('.player-input').value.trim() || `참여자${i + 1}`);
      const results = rows.map((r, i) => r.querySelector('.result-input').value.trim() || `결과${i + 1}`);
      const shuffled = [...results].sort(() => Math.random() - 0.5);

      const n = players.length;
      const ROWS = 7;
      const connections = buildConnections(n, ROWS);
      const paths = calcPaths(n, ROWS, connections);

      ladderState = { players, results: shuffled, connections, paths, n, ROWS };

      document.getElementById('ladder-setup').classList.add('hidden');
      document.getElementById('ladder-game').classList.remove('hidden');
      document.getElementById('reveal-btn').style.display = '';
      const existing = document.getElementById('result-list');
      if (existing) existing.remove();

      drawLadder(new Set());
    }

    function buildConnections(n, ROWS) {
      const conns = [];
      for (let row = 0; row < ROWS; row++) {
        const used = new Set();
        for (let col = 0; col < n - 1; col++) {
          if (!used.has(col) && !used.has(col - 1) && Math.random() < 0.45) {
            conns.push({ row, col });
            used.add(col);
            used.add(col + 1);
          }
        }
      }
      return conns;
    }

    function calcPaths(n, ROWS, conns) {
      return Array.from({ length: n }, (_, start) => {
        let col = start;
        const steps = [];
        for (let row = 0; row < ROWS; row++) {
          const right = conns.find(c => c.row === row && c.col === col);
          const left  = conns.find(c => c.row === row && c.col === col - 1);
          if (right)      { steps.push({ row, toCol: col + 1 }); col++; }
          else if (left)  { steps.push({ row, toCol: col - 1 }); col--; }
        }
        return { start, end: col, steps };
      });
    }

    function drawLadder(highlighted) {
      const { players, results, connections, paths, n, ROWS } = ladderState;
      const canvas = document.getElementById('ladder-canvas');
      const ctx = canvas.getContext('2d');

      const PAD     = 32;
      const NAME_H  = 44;
      const ROW_GAP = 38;
      const RES_H   = 44;
      const avail   = Math.min(window.innerWidth - 48, 460) - PAD * 2;
      const COL_GAP = n > 1 ? Math.min(80, avail / (n - 1)) : 80;
      const W       = COL_GAP * (n - 1) + PAD * 2;
      const H       = NAME_H + (ROWS + 1) * ROW_GAP + RES_H;

      canvas.width  = W;
      canvas.height = H;
      ctx.clearRect(0, 0, W, H);

      const X = col => PAD + col * COL_GAP;
      const Y = row => NAME_H + (row + 1) * ROW_GAP;
      const TOP    = NAME_H;
      const BOTTOM = NAME_H + (ROWS + 1) * ROW_GAP;

      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';

      // 플레이어 이름
      players.forEach((name, i) => {
        ctx.font      = 'bold 13px Pretendard, sans-serif';
        ctx.fillStyle = highlighted.has(i) ? '#6c5ce7' : '#2d3436';
        ctx.fillText(clip(name, 4), X(i), NAME_H / 2);
      });

      // 결과 (공개 전엔 ?)
      const revealed = highlighted.size > 0;
      results.forEach((res, i) => {
        ctx.font      = 'bold 13px Pretendard, sans-serif';
        ctx.fillStyle = revealed ? '#6c5ce7' : '#b2bec3';
        ctx.fillText(revealed ? clip(res, 4) : '?', X(i), BOTTOM + RES_H / 2);
      });

      // 세로선
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth   = 3;
      ctx.lineCap     = 'round';
      players.forEach((_, i) => {
        ctx.beginPath();
        ctx.moveTo(X(i), TOP);
        ctx.lineTo(X(i), BOTTOM);
        ctx.stroke();
      });

      // 가로선
      connections.forEach(({ row, col }) => {
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth   = 3;
        ctx.beginPath();
        ctx.moveTo(X(col), Y(row));
        ctx.lineTo(X(col + 1), Y(row));
        ctx.stroke();
      });

      // 강조 경로
      highlighted.forEach(idx => {
        const path = paths[idx];
        const moveMap = {};
        path.steps.forEach(s => { moveMap[s.row] = s.toCol; });

        ctx.strokeStyle = '#6c5ce7';
        ctx.lineWidth   = 5;
        ctx.shadowColor = 'rgba(108, 92, 231, 0.4)';
        ctx.shadowBlur  = 10;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';

        let col = path.start;
        ctx.beginPath();
        ctx.moveTo(X(col), TOP);
        for (let row = 0; row < ROWS; row++) {
          ctx.lineTo(X(col), Y(row));
          if (moveMap[row] !== undefined) {
            col = moveMap[row];
            ctx.lineTo(X(col), Y(row));
          }
        }
        ctx.lineTo(X(col), BOTTOM);
        ctx.stroke();
        ctx.shadowBlur = 0;
      });
    }

    function revealResults() {
      const all = new Set(ladderState.players.map((_, i) => i));
      drawLadder(all);
      document.getElementById('reveal-btn').style.display = 'none';

      const list = document.createElement('div');
      list.id = 'result-list';
      list.className = 'result-list fade-in';
      ladderState.paths.forEach(p => {
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `
          <span class="result-player">${ladderState.players[p.start]}</span>
          <span class="result-arrow">→</span>
          <span class="result-value">${ladderState.results[p.end]}</span>
        `;
        list.appendChild(item);
      });
      document.getElementById('ladder-game').appendChild(list);
    }

    function resetLadder() {
      document.getElementById('ladder-setup').classList.remove('hidden');
      document.getElementById('ladder-game').classList.add('hidden');
      const rl = document.getElementById('result-list');
      if (rl) rl.remove();
    }

    function clip(str, max) {
      return str.length > max ? str.slice(0, max) + '..' : str;
    }

    // ==================== 밸런스 게임 ====================
    let balanceQuestions = [];
    let balanceQueue = [];
    let balanceCurrent = 0;

    async function loadBalance() {
      try {
        const res = await fetch('../content/balance.json');
        balanceQuestions = await res.json();
      } catch (e) { console.error('balance.json 로딩 실패', e); }
    }

    function startBalance() {
      balanceQueue = [...balanceQuestions].sort(() => Math.random() - 0.5);
      balanceCurrent = 0;
      showBalanceQuestion();
    }

    function showBalanceQuestion() {
      if (balanceCurrent >= balanceQueue.length) {
        balanceCurrent = 0;
        balanceQueue = [...balanceQueue].sort(() => Math.random() - 0.5);
      }
      const q = balanceQueue[balanceCurrent];
      document.getElementById('balance-a').textContent = q.a;
      document.getElementById('balance-b').textContent = q.b;
      document.getElementById('balance-a').classList.remove('selected');
      document.getElementById('balance-b').classList.remove('selected');
      document.getElementById('balance-progress').textContent =
        `${balanceCurrent + 1} / ${balanceQueue.length}`;
    }

    document.getElementById('balance-a').addEventListener('click', function () {
      document.getElementById('balance-b').classList.remove('selected');
      this.classList.toggle('selected');
    });
    document.getElementById('balance-b').addEventListener('click', function () {
      document.getElementById('balance-a').classList.remove('selected');
      this.classList.toggle('selected');
    });
    document.getElementById('balance-next').addEventListener('click', () => {
      balanceCurrent++;
      showBalanceQuestion();
    });

    loadBalance();

    // ==================== 초성 퀴즈 ====================
    let quizQuestions = [];
    let quizQueue = [];
    let quizCurrent = 0;
    let quizTimer = null;
    let quizTimeLeft = 10;
    const QUIZ_TIME = 10;

    async function loadQuiz() {
      try {
        const res = await fetch('../content/consonants.json');
        quizQuestions = await res.json();
      } catch (e) { console.error('consonants.json 로딩 실패', e); }
    }

    function startQuiz() {
      quizQueue = [...quizQuestions].sort(() => Math.random() - 0.5);
      quizCurrent = 0;
      showQuizQuestion();
    }

    function showQuizQuestion() {
      if (quizCurrent >= quizQueue.length) {
        quizCurrent = 0;
        quizQueue = [...quizQueue].sort(() => Math.random() - 0.5);
      }
      const q = quizQueue[quizCurrent];
      document.getElementById('quiz-consonants').textContent = q.consonants;
      document.getElementById('quiz-hint').textContent = q.hint;
      document.getElementById('quiz-hint').classList.add('hidden');
      document.getElementById('quiz-answer').textContent = q.answer;
      document.getElementById('quiz-answer').classList.add('hidden');
      document.getElementById('quiz-actions').classList.remove('hidden');
      document.getElementById('quiz-next-btn').classList.add('hidden');
      document.getElementById('quiz-progress').textContent =
        `${quizCurrent + 1} / ${quizQueue.length}`;
      startQuizTimer();
    }

    function startQuizTimer() {
      clearInterval(quizTimer);
      quizTimeLeft = QUIZ_TIME;
      updateTimerBar();
      quizTimer = setInterval(() => {
        quizTimeLeft -= 0.1;
        updateTimerBar();
        if (quizTimeLeft <= 0) revealQuizAnswer();
      }, 100);
    }

    function updateTimerBar() {
      const pct = Math.max(0, quizTimeLeft / QUIZ_TIME * 100);
      document.getElementById('quiz-timer-fill').style.width = pct + '%';
    }

    function revealQuizAnswer() {
      clearInterval(quizTimer);
      document.getElementById('quiz-timer-fill').style.width = '0%';
      document.getElementById('quiz-answer').classList.remove('hidden');
      document.getElementById('quiz-actions').classList.add('hidden');
      document.getElementById('quiz-next-btn').classList.remove('hidden');
    }

    document.getElementById('quiz-hint-btn').addEventListener('click', () => {
      document.getElementById('quiz-hint').classList.remove('hidden');
    });
    document.getElementById('quiz-reveal-btn').addEventListener('click', revealQuizAnswer);
    document.getElementById('quiz-next-btn').addEventListener('click', () => {
      quizCurrent++;
      showQuizQuestion();
    });

    loadQuiz();

    // 게임 전환 시 초성 퀴즈 타이머 정리
    const _origSwitchGame = switchGame;
    // switchGame 에서 quiz 외 게임으로 이동하면 타이머 정지
    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        if (card.dataset.game !== 'quiz') clearInterval(quizTimer);
        if (card.dataset.game === 'balance') startBalance();
        if (card.dataset.game === 'quiz') startQuiz();
      });
    });
  </script>
</body>
</html>
