<body class="quiz-theme">

  <main class="game-page">
    <div class="container">
      <div class="quiz-progress" id="quiz-progress">1 / 25</div>
      <div class="quiz-card">
        <div class="quiz-consonants" id="quiz-consonants">ㅊㅋ</div>
        <div class="quiz-timer-bar">
          <div class="quiz-timer-fill" id="quiz-timer-fill"></div>
        </div>
        <div class="quiz-hint hidden" id="quiz-hint"></div>

      <div class="quiz-actions" id="quiz-actions">

      </div>
      <button class="generate-btn hidden" id="quiz-next-btn">다음 문제 →</button>
    </div>
  </main>

  <section class="situations-section" data-aos="fade-up">
    <h2>이런 상황에서 활용해보세요</h2>

      <div class="situation-card"><span class="sit-icon">🏆</span><span class="sit-text">친구와 대결</span></div>

  <div class="toast" id="toast">🔗 링크가 복사되었어요!</div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    let questions = [];
    let queue = [];
    let current = 0;
    let timer = null;
    let timeLeft = 10;
    const TOTAL_TIME = 10;

    async function load() {
      try {
        const res = await fetch('content/consonants.json');
        questions = await res.json();
        queue = [...questions].sort(() => Math.random() - 0.5);
        show();
      } catch (e) { console.error('consonants.json 로딩 실패', e); }
    }

    function show() {
      if (current >= queue.length) {
        current = 0;
        queue = [...queue].sort(() => Math.random() - 0.5);
      }
      const q = queue[current];
      document.getElementById('quiz-consonants').textContent = q.consonants;
      document.getElementById('quiz-hint').textContent = q.hint;
      document.getElementById('quiz-hint').classList.add('hidden');
      document.getElementById('quiz-answer').textContent = q.answer;
      document.getElementById('quiz-answer').classList.add('hidden');
      document.getElementById('quiz-actions').classList.remove('hidden');
      document.getElementById('quiz-next-btn').classList.add('hidden');
      document.getElementById('quiz-progress').textContent = `${current + 1} / ${queue.length}`;
      startTimer();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = TOTAL_TIME;
      updateBar();
      timer = setInterval(() => {
        timeLeft -= 0.1;
        updateBar();
        if (timeLeft <= 0) reveal();
      }, 100);
    }

    function updateBar() {
      document.getElementById('quiz-timer-fill').style.width = Math.max(0, timeLeft / TOTAL_TIME * 100) + '%';
    }

    function reveal() {
      clearInterval(timer);
      document.getElementById('quiz-timer-fill').style.width = '0%';
      document.getElementById('quiz-answer').classList.remove('hidden');
      document.getElementById('quiz-actions').classList.add('hidden');
      document.getElementById('quiz-next-btn').classList.remove('hidden');
    }

    document.getElementById('quiz-hint-btn').addEventListener('click', () => {
      document.getElementById('quiz-hint').classList.remove('hidden');
    });
    document.getElementById('quiz-reveal-btn').addEventListener('click', reveal);
    document.getElementById('quiz-next-btn').addEventListener('click', () => { current++; show(); });

    load();
    AOS.init({ once: true, duration: 500, offset: 40 });

    document.getElementById('share-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      });
    });
  </script>
