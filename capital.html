    .capital-score-bar {
      display: flex;
      justify-content: space-between;

    }
    .capital-progress {
      font-size: 0.85rem;

    .capital-score {
      font-size: 0.85rem;
      font-weight: 700;

    }
    .capital-country {
      font-size: 1.1rem;

      margin-bottom: 6px;
    }
    .capital-question {
      font-size: 1.55rem;
      font-weight: 800;
      text-align: center;
      color: var(--text-main);
      margin-bottom: 20px;

    }
    .capital-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;

    .capital-opt {

      border: 2px solid transparent;
      border-radius: 14px;
      padding: 16px 12px;

      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      line-height: 1.3;
    }
    .capital-opt:hover:not(:disabled) {
      border-color: var(--accent-color);
      transform: translateY(-2px);
    }
    .capital-opt.correct {
      background: #00b894;
      border-color: #00b894;
      color: #fff;
    }
    .capital-opt.wrong {
      background: #e17055;
      border-color: #e17055;
      color: #fff;
    }
    .capital-opt:disabled {
      cursor: default;
    }
    /* 결과 화면 */
    .capital-result {
      text-align: center;
      padding: 20px 0;
    }
    .capital-result-emoji {
      font-size: 4rem;
      margin-bottom: 12px;

    .capital-result-title {

<body class="capital-theme">

  <main class="game-page">
    <div class="container">

      <!-- 게임 중 화면 -->
      <div id="capital-game">
        <div class="capital-score-bar">
          <span class="capital-progress" id="cap-progress">1 / 10</span>
          <span class="capital-score">점수 <span id="cap-score">0</span></span>
        </div>
        <div class="quiz-timer-bar">
          <div class="quiz-timer-fill" id="cap-timer-fill"></div>
        </div>
        <br>
        <p class="capital-country">이 나라의 수도는?</p>
        <p class="capital-question" id="cap-country">...</p>
        <div class="capital-options" id="cap-options"></div>
      </div>

      <!-- 결과 화면 -->
      <div id="capital-result" class="capital-result hidden">
        <div class="capital-result-emoji" id="res-emoji">🏆</div>

        <div class="capital-result-score"><span id="res-score">0</span> / 10</div>
        <div class="capital-result-sub" id="res-sub">다시 도전해보세요!</div>
        <button class="generate-btn" id="cap-retry-btn">🔄 다시 하기</button>
      </div>

    </div>
  </main>

  <section class="situations-section" data-aos="fade-up">
    <h2>이런 상황에서 활용해보세요</h2>

      <div class="situation-card"><span class="sit-icon">🏆</span><span class="sit-text">친구와 점수 대결</span></div>
      <div class="situation-card"><span class="sit-icon">🎓</span><span class="sit-text">지리 공부</span></div>
    </div>

  <div class="toast" id="toast">🔗 링크가 복사되었어요!</div>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ once: true, duration: 500, offset: 40 });

    const ROUND = 10;
    const TIME = 12;
    let allData = [];
    let queue = [];
    let current = 0;
    let score = 0;
    let timer = null;
    let timeLeft = TIME;
    let answered = false;

    async function load() {
      try {
        const res = await fetch('content/capitals.json');
        allData = await res.json();
        startGame();
      } catch (e) { console.error('capitals.json 로딩 실패', e); }
    }

    function startGame() {
      score = 0;
      current = 0;
      queue = [...allData].sort(() => Math.random() - 0.5).slice(0, ROUND);
      document.getElementById('capital-result').classList.add('hidden');
      document.getElementById('capital-game').classList.remove('hidden');
      showQuestion();
    }

    function showQuestion() {
      answered = false;
      const q = queue[current];
      document.getElementById('cap-progress').textContent = `${current + 1} / ${ROUND}`;
      document.getElementById('cap-score').textContent = score;
      document.getElementById('cap-country').textContent = q.country;

      // 4가지 보기 생성 (정답 1 + 오답 3)
      const others = allData
        .filter(d => d.capital !== q.capital)
        .sort(() => Math.random() - 0.5)
        .slice(0, 3)
        .map(d => d.capital);
      const opts = [q.capital, ...others].sort(() => Math.random() - 0.5);

      const container = document.getElementById('cap-options');
      container.innerHTML = '';
      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'capital-opt';
        btn.textContent = opt;
        btn.addEventListener('click', () => selectAnswer(btn, opt, q.capital));
        container.appendChild(btn);
      });

      startTimer();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = TIME;
      updateTimerBar();
      timer = setInterval(() => {
        timeLeft -= 0.1;
        updateTimerBar();
        if (timeLeft <= 0) timeUp();
      }, 100);
    }

    function updateTimerBar() {
      document.getElementById('cap-timer-fill').style.width =
        Math.max(0, timeLeft / TIME * 100) + '%';
    }

    function timeUp() {
      if (answered) return;
      answered = true;
      clearInterval(timer);
      // 정답 표시
      const btns = document.querySelectorAll('.capital-opt');
      const correct = queue[current].capital;
      btns.forEach(b => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add('correct');
      });
      setTimeout(nextOrEnd, 1400);
    }

    function selectAnswer(btn, selected, correct) {
      if (answered) return;
      answered = true;
      clearInterval(timer);
      document.querySelectorAll('.capital-opt').forEach(b => b.disabled = true);

      if (selected === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.capital-opt').forEach(b => {
          if (b.textContent === correct) b.classList.add('correct');
        });
      }
      document.getElementById('cap-score').textContent = score;
      setTimeout(nextOrEnd, 1200);
    }

    function nextOrEnd() {
      current++;
      if (current >= ROUND) {
        showResult();
      } else {
        showQuestion();
      }
    }

    function showResult() {
      document.getElementById('capital-game').classList.add('hidden');
      document.getElementById('capital-result').classList.remove('hidden');
      document.getElementById('res-score').textContent = score;

      const ratio = score / ROUND;
      let emoji, title, sub;
      if (ratio >= 0.9) { emoji = '🏆'; title = '세계 지리 박사!'; sub = '완벽한 수도 지식을 보여줬어요!'; }
      else if (ratio >= 0.7) { emoji = '🌍'; title = '여행 전문가!'; sub = '훌륭해요! 조금만 더 공부하면 만점!'; }
      else if (ratio >= 0.5) { emoji = '✈️'; title = '여행 준비 중'; sub = '절반 이상 맞췄어요! 다시 도전해보세요.'; }
      else { emoji = '🗺️'; title = '지도를 펼쳐봐요!'; sub = '수도 공부 후 다시 도전해보세요!'; }

      document.getElementById('res-emoji').textContent = emoji;
      document.getElementById('res-title').textContent = title;
      document.getElementById('res-sub').textContent = sub;
    }

    document.getElementById('cap-retry-btn').addEventListener('click', startGame);

    document.getElementById('share-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      });
    });

    load();
  </script>
