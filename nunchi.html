  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ once: true, duration: 500, offset: 40 });

    const COLORS = ['#e84393','#0984e3','#00b894','#e17055','#6c5ce7','#f9ca24'];
    const SIMULTANEOUS_MS = 320;
    const DEFAULT_NAMES = ['플레이어 1','플레이어 2','플레이어 3','플레이어 4','플레이어 5','플레이어 6'];

    let playerCount = 3;
    let players = [];
    let eliminated = new Set();
    let currentNumber = 1;
    let tapsThisRound = [];
    let resolveTimer = null;
    let roundActive = false;

    // ----- 설정 화면 -----
    const countBtns = document.querySelectorAll('.nunchi-count-btn');
    countBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        countBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        playerCount = parseInt(btn.dataset.n);
        renderNameInputs();
      });
    });

    function renderNameInputs() {
      const container = document.getElementById('name-inputs');
      container.innerHTML = '';
      for (let i = 0; i < playerCount; i++) {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = DEFAULT_NAMES[i];
        inp.style.borderLeftColor = COLORS[i];
        inp.style.borderLeftWidth = '4px';
        container.appendChild(inp);
      }
    }
    renderNameInputs();

    document.getElementById('nunchi-start-btn').addEventListener('click', () => {
      const inputs = document.querySelectorAll('#name-inputs input');
      players = Array.from(inputs).map((inp, i) =>
        inp.value.trim() || DEFAULT_NAMES[i]
      );
      startGame();
    });

    // ----- 게임 로직 -----
    function startGame() {
      eliminated = new Set();
      currentNumber = 1;
      tapsThisRound = [];
      resolveTimer = null;
      roundActive = true;

      document.getElementById('nunchi-setup').classList.add('hidden');
      document.getElementById('nunchi-result').classList.add('hidden');
      document.getElementById('nunchi-game').classList.remove('hidden');

      renderZones();
      updateDisplay();
    }

    function renderZones() {
      const container = document.getElementById('nunchi-zones');
      container.innerHTML = '';
      players.forEach((name, i) => {
        const zone = document.createElement('div');
        zone.className = 'nunchi-zone';
        zone.id = `zone-${i}`;
        zone.style.background = COLORS[i];
        zone.innerHTML = `
          <span class="zone-name">${name}</span>
          <span class="zone-claimed" id="zone-claimed-${i}"></span>
          <span class="zone-tap-hint">탭!</span>
          <span class="nunchi-out-badge">💀</span>
        `;
        zone.addEventListener('click', () => onZoneTap(i));
        zone.addEventListener('touchstart', (e) => { e.preventDefault(); onZoneTap(i); }, { passive: false });
        container.appendChild(zone);
      });
    }

    function updateDisplay() {
      document.getElementById('nunchi-number').textContent = currentNumber;
      const alive = players.length - eliminated.size;
      document.getElementById('nunchi-survivors').textContent = `생존자 ${alive}명`;
      document.getElementById('nunchi-status').textContent = '버튼을 눌러 이 숫자를 선점하세요!';
    }

    function onZoneTap(idx) {
      if (!roundActive) return;
      if (eliminated.has(idx)) return;
      if (tapsThisRound.includes(idx)) return;

      tapsThisRound.push(idx);

      // 탭 시각 피드백
      const zone = document.getElementById(`zone-${idx}`);
      zone.style.transform = 'scale(0.93)';
      setTimeout(() => { zone.style.transform = ''; }, 100);

      if (!resolveTimer) {
        resolveTimer = setTimeout(resolveRound, SIMULTANEOUS_MS);
      }
    }

    function resolveRound() {
      roundActive = false;
      resolveTimer = null;
      const taps = [...tapsThisRound];
      tapsThisRound = [];

      if (taps.length === 0) {
        roundActive = true;
        return;
      }

      if (taps.length === 1) {
        // 단독 선점
        const winner = taps[0];
        const zone = document.getElementById(`zone-${winner}`);
        document.getElementById(`zone-claimed-${winner}`).textContent = currentNumber;
        numberPop();
        document.getElementById('nunchi-status').textContent =
          `${players[winner]} 님이 ${currentNumber} 선점! 👏`;
        currentNumber++;

        setTimeout(() => {
          updateDisplay();
          roundActive = true;
        }, 700);

      } else {
        // 동시 탭 → 탈락
        taps.forEach(idx => eliminated.add(idx));
        const names = taps.map(i => players[i]).join(', ');
        showCollision(`${names} 탈락! 💀`);

        taps.forEach(idx => {
          document.getElementById(`zone-${idx}`).classList.add('eliminated');
        });

        const alive = players.length - eliminated.size;
        setTimeout(() => {
          if (alive <= 1) {
            endGame();
          } else {
            document.getElementById('nunchi-survivors').textContent = `생존자 ${alive}명`;
            document.getElementById('nunchi-status').textContent = '계속하세요!';
            roundActive = true;
          }
        }, 1400);
      }
    }

    function numberPop() {
      const el = document.getElementById('nunchi-number');
      el.classList.remove('pop');
      void el.offsetWidth;
      el.classList.add('pop');
    }

    function showCollision(msg) {
      const el = document.getElementById('collision-msg');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1300);
    }

    function endGame() {
      document.getElementById('nunchi-game').classList.add('hidden');
      document.getElementById('nunchi-result').classList.remove('hidden');

      const survivors = players.filter((_, i) => !eliminated.has(i));
      const el_emoji = document.getElementById('nunchi-res-emoji');
      const el_title = document.getElementById('nunchi-res-title');
      const el_sub   = document.getElementById('nunchi-res-sub');

      if (survivors.length === 1) {
        el_emoji.textContent = '👑';
        el_title.textContent = `${survivors[0]} 님이 눈치왕!`;
        el_sub.textContent = `${currentNumber - 1}번까지 살아남았어요!`;
      } else if (survivors.length === 0) {
        el_emoji.textContent = '💥';
        el_title.textContent = '전원 탈락!';
        el_sub.textContent = '모두 함께 탈락했어요. 다시 도전!';
      } else {
        el_emoji.textContent = '🤝';
        el_title.textContent = `공동 눈치왕!`;
        el_sub.textContent = `${survivors.join(', ')} 님이 함께 살아남았어요!`;
      }
    }

    document.getElementById('nunchi-retry-btn').addEventListener('click', () => {
      document.getElementById('nunchi-result').classList.add('hidden');
      document.getElementById('nunchi-setup').classList.remove('hidden');
    });

    document.getElementById('share-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
      });
    });
  </script>
